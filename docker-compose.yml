version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: token_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - token_network

volumes:
  postgres_data:

networks:
  token_network:
    driver: bridge
