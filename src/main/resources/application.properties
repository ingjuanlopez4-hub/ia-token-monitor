# Configuración de conexión a PostgreSQL / TimeScaleDB
spring.datasource.url=jdbc:postgresql://localhost:5432/token_db
spring.datasource.username=monitor
spring.datasource.password=monitor_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Actualiza el esquema automáticamente basándose en las entidades (ideal para desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

<dependency>
<groupId>org.springframework.boot</groupId>
<artifactId>spring-boot-starter-data-jpa</artifactId>
</dependency>

<dependency>
<groupId>org.postgresql</groupId>
<artifactId>postgresql</artifactId>
<scope>runtime</scope>
</dependency>