server.port=8085

# 🐘 Conexión a PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/ia_token_db
spring.datasource.username=admin_token
spring.datasource.password=PasswordSuperSeguro2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de Hibernate para crear las tablas automaticamente
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Configuración JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
